name: Agent Remote Publisher

on:
  workflow_dispatch: # Allows remote agents to wake the system

jobs:
  prepare-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install Dependencies
        run: npm install

      - name: Notify Agent
        run: echo "Environment ready. Agent may now proceed to generate content and execute npm run publish-post."